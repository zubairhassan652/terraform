{{- if .Values.flower.enabled }}
{{- if .Values.flower.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ .Release.Name }}-flower-ingress
  namespace: {{ .Release.Namespace }}
  annotations:
    {{- range $key, $value := .Values.flower.ingress.annotations }}
    {{ $key }}: {{ $value | quote }}
    {{- end }}
spec:
  ingressClassName: {{ .Values.flower.ingress.ingressClassName }}
  rules:
    - host: {{ .Values.flower.ingress.host }}
      http:
        paths:
          - path: {{ .Values.flower.ingress.path }}
            pathType: {{ .Values.flower.ingress.pathType }}
            backend:
              service:
                name: {{ .Release.Name }}-flower-service
                port:
                  number: {{ .Values.flower.port }}
{{- end }}
{{- end }}