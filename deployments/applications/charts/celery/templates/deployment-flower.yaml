apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-flower
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.flower.replicaCount }}
  selector:
    matchLabels:
      app: {{ .Release.Name }}-flower
  template:
    metadata:
      labels:
        app: {{ .Release.Name }}-flower
    spec:
      containers:
        - name: flower
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - containerPort: {{ .Values.flower.port }}
          env:
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secret.name }}
                  key: REDIS_URL
          command: ["/bin/sh", "-c"]
          args:
            - "celery -A {{ .Values.celeryApp }} flower --port={{ .Values.flower.port }} --broker=$REDIS_URL"
          resources:
            requests:
              memory: {{ .Values.flower.resources.requests.memory }}
              cpu: {{ .Values.flower.resources.requests.cpu }}
            limits:
              memory: {{ .Values.flower.resources.limits.memory }}
              cpu: {{ .Values.flower.resources.limits.cpu }}