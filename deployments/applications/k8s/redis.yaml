# redis-app.yaml
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
  namespace: argocd
spec:
  project: default

  source:
    repoURL: https://charts.bitnami.com/bitnami   # ← Bitnami Helm repo
    chart: redis                                   # ← official redis chart
    targetRevision: 19.6.4                         # ← stable version

    helm:
      values: |
        architecture: standalone          # standalone (1 pod) vs replication
        auth:
          enabled: false                  # disable password for Minikube dev
        master:
          persistence:
            enabled: false               # disable PVC for Minikube simplicity
        replica:
          replicaCount: 0               # no replicas needed for dev

  destination:
    server: https://kubernetes.default.svc
    namespace: argocd                     # deploy to redis namespace

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true             # auto-create redis namespace