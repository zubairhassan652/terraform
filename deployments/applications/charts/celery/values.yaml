image:
  repository: zubairhassan652/fastapi
  tag: latest
  pullPolicy: Always

redis:
  url: redis://redis-redis-service.argocd.svc.cluster.local:6379/0

celeryApp: celery_app
taskModule: tasks

worker:
  replicaCount: 2
  concurrency: 2
  logLevel: info
  resources:
    requests:
      memory: "128Mi"
      cpu: "100m"
    limits:
      memory: "256Mi"
      cpu: "200m"

beat:
  enabled: true
  replicaCount: 1
  logLevel: info
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"

flower:
  enabled: true
  replicaCount: 1
  port: 5555
  logLevel: info
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
  ingress:
    enabled: true
    ingressClassName: nginx
    host: flower.example.com
    path: /
    pathType: Prefix
    annotations:
      nginx.ingress.kubernetes.io/backend-protocol: "HTTP"

secret:
  name: redis-secret

# ── HPA (CPU based) ──────────────────────────────────────────
hpa:
  enabled: false           # disable if using KEDA

# ── KEDA (queue based — recommended) ─────────────────────────
keda:
  enabled: true
  minReplicas: 1
  maxReplicas: 10
  pollingInterval: 15
  cooldownPeriod: 30
  queueLength: 5
  queue: celery
  redisAddress: "redis-redis-service.argocd.svc.cluster.local:6379"
  redisDatabase: "0"  